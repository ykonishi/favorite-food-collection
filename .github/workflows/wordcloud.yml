name: Generate Wordcloud

on:
  push:
    branches: [main]
    paths:
      - "users/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/wordcloud.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wordcloud-release
  cancel-in-progress: true

jobs:
  wordcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Generate wordcloud.png
        run: cargo run --release -- favorite-food --output wordcloud.png

      - name: Upload to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Wordcloud
          body: |
            `users/*/list.txt` から自動生成されたワードクラウドです。

            - Commit: ${{ github.sha }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: wordcloud.png
          make_latest: true
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
