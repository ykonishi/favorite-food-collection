name: Generate Wordcloud

on:
  push:
    branches: [main]
    paths:
      - "users/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/wordcloud.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wordcloud-release
  cancel-in-progress: true

env:
  RELEASE_TAG: latest
  DOWNLOAD_URL: https://github.com/MS10-DP-ISSP/favorite-food-collection/releases/download/latest/wordcloud.png
  RELEASE_PAGE_URL: https://github.com/MS10-DP-ISSP/favorite-food-collection/releases/tag/latest

jobs:
  wordcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Generate wordcloud.png
        run: cargo run --release -- favorite-food --output wordcloud.png --width 1024 --height 1024

      - name: Prepare release notes
        run: |
          cat > release-notes.md <<EOF
          \`users/*/list.txt\` から自動生成されたワードクラウドです。

          ![wordcloud](${{ env.DOWNLOAD_URL }})

          [wordcloud.png をダウンロード](${{ env.DOWNLOAD_URL }})

          - Release page: ${{ env.RELEASE_PAGE_URL }}
          - Commit: ${{ github.sha }}
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Publish to latest release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$RELEASE_TAG" -m "Latest wordcloud"
          git push origin "$RELEASE_TAG" --force

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" wordcloud.png --clobber
            gh release edit "$RELEASE_TAG" \
              --title "Latest Wordcloud" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "$RELEASE_TAG" wordcloud.png \
              --title "Latest Wordcloud" \
              --notes-file release-notes.md \
              --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
